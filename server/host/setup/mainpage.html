<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Meteor | Setup</title>
        <link rel="stylesheet" href="../style.css">
    </head>
    <body class="setup-page no-nav">
        <div class="setup-shell">
            <div class="card setup-card">
                <div class="pill">Welcome</div>
                <h1>Meteor</h1>
                <p class="muted">Set up your server and start streaming in minutes.</p>
                <div class="callout" style="margin: 18px 0;">
                    <strong>What you'll do:</strong>
                    <div class="list-grid" style="margin-top: 8px;">
                        <span>1. Name your server</span>
                        <span>2. Create an admin account</span>
                        <span>3. Add media folders</span>
                        <span>4. Optional streaming preferences</span>
                    </div>
                </div>
                <div class="button-row" style="justify-content: center;">
                    <button class="btn-primary" data-next-page="servername.html">Get Started</button>
                </div>
            </div>
        </div>
        <script src="setup-preview.js"></script>
    </body>
