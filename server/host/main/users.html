<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Meteor | Users</title>
        <link rel="stylesheet" href="../style.css">
        <style>
            body { padding: 0; padding-top: var(--nav-height); max-width: none; }
            .user-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 15px;
            margin: 20px 0;
            }
            .user-card {
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            }
            .user-card h3 {
            margin-top: 0;
            }
            .user-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            }
            .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            }
            .modal-content {
            background: var(--bg-primary);
            padding: 25px;
            border-radius: var(--radius-md);
            max-width: 420px;
            width: 92%;
            }
            .modal input,
            .modal select {
            width: 100%;
            margin-bottom: 10px;
            }
            .error {
            color: #ff8080;
            font-size: 0.9rem;
            margin: 10px 0;
            }
        </style>
    </head>
    <body>
        <nav class="navbar" id="navbar">
            <div class="navbar-left">
                <a href="/main/home.html" class="navbar-logo" aria-label="Home">
                    <img src="/svg.svg" alt="Meteor">
                </a>
                <ul class="nav-links">
                    <li><a href="/main/home.html">Home</a></li>
                    <li><a href="/main/users.html" class="active">Users</a></li>
                    <li id="navSettingsWrap" style="display: none;"><a href="/main/settings.html">Settings</a></li>
                </ul>
            </div>
            <div class="navbar-right">
                <span class="user-badge" id="userInfo">Loading...</span>
                <button type="button" class="btn-secondary" id="logout">Logout</button>
            </div>
        </nav>

        <div class="page">
            <div class="page-header">
                <div>
                    <h1>User Management</h1>
                    <p class="muted">Add or remove user profiles.</p>
                </div>
                <div class="button-row">
                    <button id="addUser" class="btn-primary">+ Add User</button>
                    <button id="back" class="btn-secondary" onclick="window.location.href='/main/home.html'">Back to Dashboard</button>
                </div>
            </div>

            <div class="callout" id="adminNotice" style="display: none;">
                Only admins can add or remove users.
            </div>

            <div class="user-list" id="userList">
                <!-- Users will be loaded here -->
            </div>
        </div>
        
        <!-- Add User Modal -->
        <div class="modal" id="addUserModal">
            <div class="modal-content">
                <h2>Add New User</h2>
                <input type="text" id="newUsername" placeholder="Username">
                <input type="text" id="newDisplayName" placeholder="Display Name">
                <input type="password" id="newPassword" placeholder="Password">
                <input type="password" id="confirmPassword" placeholder="Confirm Password">
                <select id="newRole">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <div class="error" id="addUserError"></div>
                <div class="button-row" style="justify-content: space-between;">
                    <button class="btn-primary" onclick="createUser()">Create User</button>
                    <button class="btn-secondary" onclick="closeAddUserModal()">Cancel</button>
                </div>
            </div>
        </div>
        
        <script>
        let currentUserSession = null;
        let isAdmin = false;
        
        function loadUsers() {
            fetch('/api/users')
                .then(res => res.json())
                .then(users => {
                    const list = document.getElementById('userList');
                    list.innerHTML = '';

                    if (!users.length) {
                        list.innerHTML = '<p class="muted">No users found.</p>';
                        return;
                    }

                    users.forEach(user => {
                        const card = document.createElement('div');
                        card.className = 'user-card';
                        card.innerHTML = `
                            <h3>${user.display_name}</h3>
                            <p><strong>Username:</strong> ${user.username}</p>
                            <p><strong>Role:</strong> ${user.role}</p>
                            <div class="user-actions"></div>
                        `;
                        if (isAdmin) {
                            const actions = card.querySelector('.user-actions');
                            const deleteBtn = document.createElement('button');
                            deleteBtn.className = 'btn-secondary';
                            deleteBtn.textContent = 'Delete';
                            deleteBtn.addEventListener('click', () => deleteUser(user.username));
                            actions.appendChild(deleteBtn);
                        }
                        list.appendChild(card);
                    });
                });
        }
        
        fetch('/api/user/current')
            .then(res => res.json())
            .then(user => {
                currentUserSession = user;
                isAdmin = user.role === 'admin';
                document.getElementById('userInfo').textContent = user.display_name + ' (' + user.role + ')';
                if (isAdmin) {
                    document.getElementById('navSettingsWrap').style.display = 'block';
                } else {
                    document.getElementById('adminNotice').style.display = 'block';
                    document.getElementById('addUser').disabled = true;
                }
                loadUsers();
            });
        
        function openAddUserModal() {
            if (!isAdmin) return;
            document.getElementById('addUserModal').style.display = 'flex';
        }
        
        function closeAddUserModal() {
            document.getElementById('addUserModal').style.display = 'none';
            document.getElementById('addUserError').textContent = '';
        }
        
        function createUser() {
            const username = document.getElementById('newUsername').value.trim();
            const displayName = document.getElementById('newDisplayName').value.trim();
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('newRole').value;
            const error = document.getElementById('addUserError');
            
            if (!username || !password) {
                error.textContent = 'Username and password are required.';
                return;
            }
            if (password !== confirmPassword) {
                error.textContent = 'Passwords do not match.';
                return;
            }
            
            fetch('/api/users/new', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: username,
                    display_name: displayName || username,
                    password: password,
                    role: role
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    error.textContent = data.error;
                } else {
                    closeAddUserModal();
                    loadUsers();
                }
            })
            .catch(() => {
                error.textContent = 'Failed to create user.';
            });
        }
        
        function deleteUser(username) {
            if (!confirm('Are you sure you want to delete user ' + username + '?')) {
                return;
            }
            
            fetch('/api/users/' + encodeURIComponent(username), {
                method: 'DELETE'
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    loadUsers();
                }
            })
            .catch(() => {
                alert('Failed to delete user.');
            });
        }
        
        document.getElementById('addUser').addEventListener('click', openAddUserModal);
        document.getElementById('logout').addEventListener('click', () => {
            fetch('/api/logout', { method: 'POST' }).then(() => { window.location.href = '/setup/select_user.html'; });
        });

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (nav) nav.classList.toggle('scrolled', window.scrollY > 50);
        });
        </script>
    </body>
</html>
