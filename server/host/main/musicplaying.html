<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Meteor | Now Playing</title>
        <link rel="stylesheet" href="../style.css">
        <style>
            body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 24px;
            }
            .player-container {
            max-width: 820px;
            width: 100%;
            padding: 24px;
            background-color: var(--bg-secondary);
            border-radius: var(--radius-lg);
            text-align: center;
            }
            .player-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            }
            .album-art {
            width: 280px;
            height: 280px;
            margin: 0 auto 24px;
            background-color: #333;
            border-radius: 12px;
            }
            .track-info h2 {
            font-size: 2rem;
            margin-bottom: 8px;
            }
            .track-info p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            }
            .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
            }
            .controls button {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 2rem;
            cursor: pointer;
            }
            .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #444;
            border-radius: 4px;
            overflow: hidden;
            }
            .progress {
            width: 0%;
            height: 100%;
            background-color: var(--accent);
            }
        </style>
    </head>
    <body class="no-nav">
        <div class="player-container">
            <div class="player-top">
                <button class="btn-secondary" onclick="window.location.href='/main/home.html'">Back</button>
                <span class="muted">Now Playing</span>
                <span></span>
            </div>
            <div class="album-art"></div>
            <div class="track-info">
                <h2 id="trackTitle">Track Title</h2>
                <p id="trackArtist">Artist Name</p>
            </div>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="controls">
                <button id="prevBtn">⏮</button>
                <button id="playPauseBtn">▶</button>
                <button id="nextBtn">⏭</button>
            </div>
        </div>
        <script>
            const trackTitle = document.getElementById('trackTitle');
            const trackArtist = document.getElementById('trackArtist');
            const progress = document.getElementById('progress');
            const playPauseBtn = document.getElementById('playPauseBtn');

            const urlParams = new URLSearchParams(window.location.search);
            const trackPath = urlParams.get('path');

            const trackName = trackPath ? trackPath.split(/[/\\]/).pop() : 'Unknown Track';
            const audio = trackPath ? new Audio(`/api/media/file?path=${encodeURIComponent(trackPath)}`) : null;

            if (!trackPath) {
                trackTitle.textContent = 'No track selected';
                trackArtist.textContent = 'Go back to the library to choose a song.';
            } else {
                trackTitle.textContent = trackName;
                trackArtist.textContent = 'Unknown Artist';
            }

            playPauseBtn.addEventListener('click', () => {
                if (!audio) return;
                if (audio.paused) {
                    audio.play();
                    playPauseBtn.textContent = '⏸';
                } else {
                    audio.pause();
                    playPauseBtn.textContent = '▶';
                }
            });

            if (audio) {
                audio.addEventListener('timeupdate', () => {
                    const progressPercent = (audio.currentTime / audio.duration) * 100;
                    progress.style.width = `${progressPercent}%`;
                });

                audio.addEventListener('ended', () => {
                    playPauseBtn.textContent = '▶';
                });
            }
        </script>
    </body>
</html>
