<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Meteor | Admin Settings</title>
        <link rel="stylesheet" href="../style.css">
        <style>
            body {
            padding: 0;
            padding-top: var(--nav-height);
            max-width: none;
            margin: 0;
            }
        
            .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
            }
        
            .setting-card {
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            }
        
            .setting-card h3 {
            margin-top: 0;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            }
        
            .form-group {
            margin-bottom: 15px;
            }
        
            .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            }
        
            .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            }
        
            .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            }
        </style>
    </head>
    <body>
        <nav class="navbar" id="navbar">
            <div class="navbar-left">
                <a href="/main/home.html" class="navbar-logo" aria-label="Home">
                    <img src="/svg.svg" alt="Meteor">
                </a>
                <ul class="nav-links">
                    <li><a href="/main/home.html">Home</a></li>
                    <li id="navUsersWrap" style="display: none;"><a href="/main/users.html">Users</a></li>
                    <li id="navSettingsWrap"><a href="/main/settings.html" class="active">Settings</a></li>
                </ul>
            </div>
            <div class="navbar-right">
                <span class="user-badge" id="userInfo">Admin</span>
                <button type="button" class="btn-secondary" id="logout">Logout</button>
            </div>
        </nav>

        <div class="page">
            <div class="page-header">
                <div>
                    <h1>Admin Settings</h1>
                    <p class="muted">Tune server behavior, streaming, and system limits.</p>
                </div>
                <button class="btn-secondary" onclick="window.location.href='/main/home.html'">Back</button>
            </div>
        
            <div class="settings-grid">
                <!-- Streaming Server Settings -->
                <div class="setting-card">
                    <h3>Streaming Server Settings</h3>
                    <div class="form-group">
                        <label for="serverName">Server Name</label>
                        <input type="text" id="serverName" placeholder="Server name">
                    </div>
                    <div class="form-group">
                        <label for="streamingPort">Streaming Port</label>
                        <input type="number" id="streamingPort" placeholder="8000" min="1024" max="65535">
                    </div>
                    <div class="form-group">
                        <label for="maxListeners">Max Concurrent Listeners</label>
                        <input type="number" id="maxListeners" placeholder="100" min="1" max="1000">
                    </div>
                    <div class="card-actions">
                        <button class="btn-primary" onclick="saveServerSettings()">Save</button>
                    </div>
                </div>
                
                <!-- Stream Quality Settings -->
                <div class="setting-card">
                    <h3>Stream Quality</h3>
                    <div class="form-group">
                        <label for="audioBitrate">Audio Bitrate (kbps)</label>
                        <select id="audioBitrate">
                            <option value="128">128 kbps (Standard)</option>
                            <option value="192">192 kbps (High)</option>
                            <option value="256">256 kbps (Very High)</option>
                            <option value="320">320 kbps (Lossless)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="videoQuality">Video Quality</label>
                        <select id="videoQuality">
                            <option value="720p">720p (HD)</option>
                            <option value="1080p">1080p (Full HD)</option>
                            <option value="480p">480p (SD)</option>
                            <option value="auto">Auto (Adaptive)</option>
                        </select>
                    </div>
                    <div class="card-actions">
                        <button class="btn-primary" onclick="saveQualitySettings()">Save</button>
                    </div>
                </div>
                
                <!-- Streaming Services -->
                <div class="setting-card">
                    <h3>Streaming Services</h3>
                    <div class="form-group">
                        <label for="youtubeApiKey">YouTube API Key</label>
                        <input type="password" id="youtubeApiKey" placeholder="Enter API key">
                    </div>
                    <div class="form-group">
                        <label for="spotifyClientId">Spotify Client ID</label>
                        <input type="password" id="spotifyClientId" placeholder="Enter Client ID">
                    </div>
                    <div class="form-group">
                        <label for="enableLocalFiles">Enable Local File Streaming</label>
                        <select id="enableLocalFiles">
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </div>
                    <div class="card-actions">
                        <button class="btn-primary" onclick="saveServiceSettings()">Save</button>
                    </div>
                </div>
            </div>
            
            <!-- System Settings -->
            <div class="setting-card" style="margin-top: 20px;">
                <h3>System Settings</h3>
                <div class="form-group">
                    <label for="maxUploadSize">Max Upload Size (MB)</label>
                    <input type="number" id="maxUploadSize" placeholder="100" min="1" max="1000">
                </div>
                <div class="form-group">
                    <label for="sessionTimeout">Session Timeout (minutes)</label>
                    <input type="number" id="sessionTimeout" placeholder="60" min="5" max="1440">
                </div>
                <div class="card-actions">
                    <button class="btn-primary" onclick="saveSystemSettings()">Save</button>
                </div>
            </div>
        </div>
        
        <script>
        async function loadSettings() {
            try {
                const serverResponse = await fetch('/api/server/info');
                const serverData = await serverResponse.json();
                document.getElementById('serverName').value = serverData.server_name || '';
                
                const configResponse = await fetch('/serverinfo.json');
                const configData = await configResponse.json();
                
                document.getElementById('streamingPort').value = configData.streaming_port || 8000;
                document.getElementById('maxListeners').value = configData.max_listeners || 100;
                
                document.getElementById('audioBitrate').value = configData.audio_bitrate || 128;
                document.getElementById('videoQuality').value = configData.video_quality || '720p';
                
                document.getElementById('youtubeApiKey').value = configData.youtube_api_key || '';
                document.getElementById('spotifyClientId').value = configData.spotify_client_id || '';
                document.getElementById('enableLocalFiles').value = String(configData.enable_local_files ?? 'true');
                
                document.getElementById('maxUploadSize').value = configData.max_upload_size || 100;
                document.getElementById('sessionTimeout').value = configData.session_timeout || 60;
                
            } catch (error) {
                console.error('Failed to load settings:', error);
                alert('Failed to load settings');
            }
        }
        
        async function saveServerSettings() {
            const serverName = document.getElementById('serverName').value.trim();
            const streamingPort = document.getElementById('streamingPort').value;
            const maxListeners = document.getElementById('maxListeners').value;
            
            if (!serverName) {
                alert('Server name is required');
                return;
            }
            
            try {
                const serverResponse = await fetch('/api/setup/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ server_name: serverName })
                });
                
                const streamingResponse = await fetch('/api/admin/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        streaming_port: streamingPort,
                        max_listeners: maxListeners
                    })
                });
                
                const serverResult = await serverResponse.json();
                const streamingResult = await streamingResponse.json();
                
                if (serverResult.ok && streamingResult.ok) {
                    alert('Server settings saved successfully!');
                } else {
                    alert('Failed to save server settings: ' + (serverResult.error || streamingResult.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Failed to save server settings:', error);
                alert('Failed to save server settings');
            }
        }
        
        async function saveQualitySettings() {
            const audioBitrate = document.getElementById('audioBitrate').value;
            const videoQuality = document.getElementById('videoQuality').value;
            
            try {
                const response = await fetch('/api/admin/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        audio_bitrate: audioBitrate,
                        video_quality: videoQuality
                    })
                });
                
                const result = await response.json();
                if (result.ok) {
                    alert('Quality settings saved successfully!');
                } else {
                    alert('Failed to save quality settings: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Failed to save quality settings:', error);
                alert('Failed to save quality settings');
            }
        }
        
        async function saveServiceSettings() {
            const youtubeApiKey = document.getElementById('youtubeApiKey').value;
            const spotifyClientId = document.getElementById('spotifyClientId').value;
            const enableLocalFiles = document.getElementById('enableLocalFiles').value;
            
            try {
                const response = await fetch('/api/admin/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        youtube_api_key: youtubeApiKey,
                        spotify_client_id: spotifyClientId,
                        enable_local_files: enableLocalFiles
                    })
                });
                
                const result = await response.json();
                if (result.ok) {
                    alert('Service settings saved successfully!');
                } else {
                    alert('Failed to save service settings: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Failed to save service settings:', error);
                alert('Failed to save service settings');
            }
        }
        
        async function saveSystemSettings() {
            const maxUploadSize = document.getElementById('maxUploadSize').value;
            const sessionTimeout = document.getElementById('sessionTimeout').value;
            
            try {
                const response = await fetch('/api/admin/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        max_upload_size: maxUploadSize,
                        session_timeout: sessionTimeout
                    })
                });
                
                const result = await response.json();
                if (result.ok) {
                    alert('System settings saved successfully!');
                } else {
                    alert('Failed to save system settings: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Failed to save system settings:', error);
                alert('Failed to save system settings');
            }
        }
        
        loadSettings();

        fetch('/api/user/current').then(r => r.json()).then(user => {
            document.getElementById('userInfo').textContent = user.display_name + ' (' + user.role + ')';
            if (user.role === 'admin') {
                document.getElementById('navUsersWrap').style.display = 'block';
            } else {
                alert('Admin access required.');
                window.location.href = '/main/home.html';
            }
        }).catch(() => {});

        document.getElementById('logout').addEventListener('click', () => {
            fetch('/api/logout', { method: 'POST' }).then(() => { window.location.href = '/setup/select_user.html'; });
        });

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (nav) nav.classList.toggle('scrolled', window.scrollY > 50);
        });
        </script>
    </body>
</html>
